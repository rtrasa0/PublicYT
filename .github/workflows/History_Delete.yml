name: History Delete

on:
  workflow_dispatch:
    inputs:
      clean_downloads:
        description: 'خالی کردن پوشه downloads'
        type: boolean
        default: true
      clean_runs:
        description: 'حذف تمام workflow runs'
        type: boolean
        default: true

permissions:
  contents: write
  actions: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🗑️ خالی کردن downloads
        if: github.event.inputs.clean_downloads == 'true'
        run: |
          if [ -d "downloads" ]; then
            rm -rf downloads/*
            echo "✅ پوشه downloads خالی شد."
          else
            echo "⚠️ پوشه downloads وجود نداشت."
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "🧹 خالی کردن downloads [skip ci]" || echo "بدون تغییر"
          git push

      - name: 🧹 حذف workflow runs
        if: github.event.inputs.clean_runs == 'true'
        run: |
          GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
          REPO="${{ github.repository }}"
          echo "در حال دریافت لیست همه runs..."
          RUNS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/actions/runs?per_page=100")
          RUN_IDS=$(echo "$RUNS" | jq '.workflow_runs[].id')
          if [ -z "$RUN_IDS" ]; then
            echo "✅ هیچ run ای برای حذف وجود ندارد."
            exit 0
          fi
          TOTAL=$(echo "$RUN_IDS" | wc -w)
          echo "$TOTAL run پیدا شد. شروع حذف..."
          for id in $RUN_IDS; do
            echo "حذف run: $id"
            curl -X DELETE -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/actions/runs/$id"
            sleep 0.5
          done
          echo "✅ تمام $TOTAL run حذف شدند."
