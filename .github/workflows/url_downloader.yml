name: "دانلودر لینک مستقیم"

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "Direct File URL"
        required: true
        type: string

      zip_password:
        description: "Password for archive (leave empty for no password)"
        required: false
        default: ""
        type: string

      max_part_mb:
        description: "Maximum size per part (MB)"
        required: false
        default: "94"
        type: string

      upload_method:
        description: "Upload Method"
        required: true
        default: "repository"
        type: choice
        options:
          - repository
          - release

      release_tag:
        description: "Release Tag"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  direct-download:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y p7zip-full curl zip

      - name: Download File
        id: download
        shell: bash
        run: |
          mkdir -p temp_dl

          FILE_URL="${{ github.event.inputs.file_url }}"

          FILENAME=$(basename "$FILE_URL" | cut -d'?' -f1)
          FILENAME=$(echo "$FILENAME" | sed 's/[^a-zA-Z0-9._() -]/_/g')

          # اضافه کردن timestamp به اسم فایل برای جلوگیری از تکراری شدن
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BASENAME="${FILENAME%.*}"
          EXT="${FILENAME##*.}"
          if [ "$BASENAME" = "$EXT" ]; then
            FINAL_FILENAME="${FILENAME}_${TIMESTAMP}"
          else
            FINAL_FILENAME="${BASENAME}_${TIMESTAMP}.${EXT}"
          fi

          echo "Downloading: $FINAL_FILENAME"

          curl -L --fail --retry 3 --progress-bar \
            -o "temp_dl/$FINAL_FILENAME" \
            "$FILE_URL"

          echo "filename=$FINAL_FILENAME" >> "$GITHUB_OUTPUT"
          echo "filepath=temp_dl/$FINAL_FILENAME" >> "$GITHUB_OUTPUT"

      - name: Check File Size and Create Split Archive
        id: archive
        shell: bash
        run: |
          FILEPATH="${{ steps.download.outputs.filepath }}"
          PASS="${{ github.event.inputs.zip_password }}"
          THRESH_MB="${{ github.event.inputs.max_part_mb }}"

          # تنظیم حداکثر حجم قطعات (حداکثر 94 مگابایت برای امنیت بیشتر)
          if [[ -z "$THRESH_MB" || "$THRESH_MB" -le 0 || "$THRESH_MB" -gt 94 ]]; then
            THRESH_MB=94
          fi

          cd temp_dl || exit 1
          
          ORIG_FILENAME=$(basename "$FILEPATH")
          ARCHIVE_BASE="${ORIG_FILENAME%.*}_archive"

          # بررسی حجم فایل اصلی
          FILESIZE=$(stat -c%s "$ORIG_FILENAME" 2>/dev/null || stat -f%z "$ORIG_FILENAME" 2>/dev/null || echo 0)
          THRESH_BYTES=$((THRESH_MB * 1024 * 1024))

          if [ "$FILESIZE" -gt "$THRESH_BYTES" ]; then
            echo "File size: $((FILESIZE / 1024 / 1024)) MB - Splitting into ${THRESH_MB}MB parts"
            
            if [ -n "$PASS" ]; then
              7z a -p"$PASS" -mhe=on -mx=3 -v${THRESH_MB}m "${ARCHIVE_BASE}.7z" "$ORIG_FILENAME"
            else
              7z a -mx=3 -v${THRESH_MB}m "${ARCHIVE_BASE}.7z" "$ORIG_FILENAME"
            fi
            
            # حذف فایل اصلی بعد از اسپلیت
            rm -f "$ORIG_FILENAME"
            
            echo "split_done=true" >> "$GITHUB_OUTPUT"
          else
            echo "File size: $((FILESIZE / 1024 / 1024)) MB - No split needed (below ${THRESH_MB}MB)"
            
            # اگر فایل کوچک است و پسورد دارد، زیپ کن
            if [ -n "$PASS" ]; then
              7z a -p"$PASS" -mhe=on -mx=3 "${ARCHIVE_BASE}.7z" "$ORIG_FILENAME"
              rm -f "$ORIG_FILENAME"
            fi
            
            echo "split_done=false" >> "$GITHUB_OUTPUT"
          fi
          
          echo "archive_base=${ARCHIVE_BASE}" >> "$GITHUB_OUTPUT"
          
          cd ..

      - name: List Files After Split
        shell: bash
        run: |
          echo "Files in temp_dl:"
          ls -lah temp_dl/

      - name: Get Current Date
        id: get_date
        shell: bash
        run: |
          echo "date=$(date '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_OUTPUT"

      - name: Push to Repository
        if: github.event.inputs.upload_method == 'repository'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # همگام‌سازی با آخرین تغییرات ریموت
          git pull --rebase --strategy-option=theirs origin main

          # ایجاد پوشه با نام فایل اصلی برای سازماندهی بهتر
          ORIG_NAME="${{ steps.download.outputs.filename }}"
          FOLDER_NAME="${ORIG_NAME%.*}_$(date +%Y%m%d_%H%M%S)"
          FOLDER_NAME=$(echo "$FOLDER_NAME" | sed 's/[^a-zA-Z0-9._() -]/_/g')
          
          mkdir -p "downloads/$FOLDER_NAME"

          # انتقال تمام فایل‌های temp_dl به پوشه مقصد
          if [ -d "temp_dl" ] && [ -n "$(ls -A temp_dl 2>/dev/null)" ]; then
            mv temp_dl/* "downloads/$FOLDER_NAME/" 2>/dev/null || true
            echo "Moved files to downloads/$FOLDER_NAME/"
          fi

          # اضافه کردن فایل README داخل پوشه برای توضیحات
          cat > "downloads/$FOLDER_NAME/README.txt" << EOF
Original File: ${{ steps.download.outputs.filename }}
Download Date: ${{ steps.get_date.outputs.date }}
Source URL: ${{ github.event.inputs.file_url }}
Split Size: ${{ github.event.inputs.max_part_mb }}MB per part
Password: ${{ github.event.inputs.zip_password != '' && 'Yes (password protected)' || 'No password' }}
EOF

          git add downloads/

          git commit -m "Direct Download: ${{ steps.download.outputs.filename }} [skip ci]" || echo "Nothing to commit"

          git push origin main

      - name: Upload to GitHub Releases
        if: github.event.inputs.upload_method == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('direct-{0}', github.run_number) }}
          name: Direct Download - ${{ steps.download.outputs.filename }}
          body: |
            **📥 Direct Download**

            **Original File:** ${{ steps.download.outputs.filename }}
            **Source URL:** ${{ github.event.inputs.file_url }}
            **Downloaded on:** ${{ steps.get_date.outputs.date }}
            **Split Size:** ${{ github.event.inputs.max_part_mb }}MB per part
            **Password Protected:** ${{ github.event.inputs.zip_password != '' && 'Yes' || 'No' }}

            ---
            Powered by Meli-Action ⚡
          files: temp_dl/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -rf temp_dl
