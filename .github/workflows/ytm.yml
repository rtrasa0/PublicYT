name: دانلودر یوتیوب (yt-dlp)

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: 'لینک‌های یوتیوب (حداکثر ۵ لینک، با فاصله جدا کنید)'
        required: true
        type: string
      output_format:
        description: 'نوع خروجی'
        required: true
        type: choice
        options:
          - mp4 (video)
          - mp3 (audio only)
        default: 'mp4 (video)'
      desired_quality:
        description: 'کیفیت (ویدیو: 144p,240p,360p,720p,1080p | صدا: best)'
        required: false
        type: string
        default: '360p'
      max_part_mb:
        description: 'حداکثر حجم هر قسمت (MB) - 0 = خودکار ۱۸۰۰'
        required: false
        type: string
        default: '90'
      upload_method:
        description: '📤 روش ذخیره نهایی'
        required: true
        type: choice
        options:
          - repository (push to repo)
          - release (GitHub Releases)
        default: 'repository (push to repo)'
      release_tag:
        description: '🏷️ نام تگ ریلیز (فقط در صورت انتخاب Release)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  youtube-download:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zip ffmpeg curl python3
          pip3 install --quiet yt-dlp

      - name: 🔄 Download and Process Videos
        id: process
        run: |
          mkdir -p release_files downloads
          IFS=' ' read -ra URL_ARRAY <<< "${{ github.event.inputs.video_urls }}"
          URL_ARRAY=("${URL_ARRAY[@]:0:5}")
          TOTAL=${#URL_ARRAY[@]}
          echo "Total videos to process: $TOTAL"
          [ $TOTAL -eq 0 ] && { echo "::error::No valid URLs provided"; exit 1; }

          FMT="${{ github.event.inputs.output_format }}"
          QUALITY="${{ github.event.inputs.desired_quality }}"
          MAX_MB="${{ github.event.inputs.max_part_mb }}"

          # تنظیم فرمت yt-dlp بر اساس نوع خروجی و کیفیت
          if [[ "$FMT" == "mp3 (audio only)" ]]; then
            YT_FORMAT="bestaudio/best"
            POSTPROC="--extract-audio --audio-format mp3"
            OUTFILE_TEMPLATE="%(title).70s_%(id)s.%(ext)s"
          else
            # انتخاب کیفیت ویدیو: بهترین ترکیب ویدیو+صدا با کیفیت مشخص
            case "$QUALITY" in
              144p)  FORMAT_SELECT="bestvideo[height<=144]+bestaudio/best[height<=144]" ;;
              240p)  FORMAT_SELECT="bestvideo[height<=240]+bestaudio/best[height<=240]" ;;
              360p)  FORMAT_SELECT="bestvideo[height<=360]+bestaudio/best[height<=360]" ;;
              480p)  FORMAT_SELECT="bestvideo[height<=480]+bestaudio/best[height<=480]" ;;
              720p)  FORMAT_SELECT="bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
              1080p) FORMAT_SELECT="bestvideo[height<=1080]+bestaudio/best[height<=1080]" ;;
              *)     FORMAT_SELECT="bestvideo[height<=360]+bestaudio/best[height<=360]" ;;
            esac
            YT_FORMAT="$FORMAT_SELECT"
            POSTPROC="--merge-output-format mp4"
            OUTFILE_TEMPLATE="%(title).70s_%(id)s.%(ext)s"
          fi

          for idx in "${!URL_ARRAY[@]}"; do
            url="${URL_ARRAY[$idx]}"
            echo "=========================================="
            echo "Processing video $((idx+1)) of $TOTAL: $url"
            echo "=========================================="

            # ایجاد پوشه موقت برای این ویدیو
            TEMP_DIR="release_files/video_${idx}"
            mkdir -p "$TEMP_DIR"

            # دانلود با yt-dlp
            yt-dlp \
              --no-playlist \
              --format "$YT_FORMAT" \
              $POSTPROC \
              --output "$TEMP_DIR/$OUTFILE_TEMPLATE" \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
              --no-check-certificate \
              --socket-timeout 30 \
              --retries 5 \
              "$url" || { echo "::error::Download failed for $url"; exit 1; }

            # پیدا کردن فایل دانلود شده
            DOWNLOADED_FILE=$(ls "$TEMP_DIR"/* 2>/dev/null | head -1)
            if [ -z "$DOWNLOADED_FILE" ]; then
              echo "::error::No file found after download"
              exit 1
            fi

            # تقسیم فایل در صورت نیاز
            SIZE_BYTES=$(stat -c%s "$DOWNLOADED_FILE")
            THRESH_MB=${MAX_MB:-0}
            if [ "$THRESH_MB" -le 0 ] || [ "$THRESH_MB" -gt 1900 ]; then
              THRESH_MB=1800
            fi
            THRESH_BYTES=$((THRESH_MB * 1024 * 1024))

            if [ $SIZE_BYTES -gt $THRESH_BYTES ]; then
              echo "File size $(numfmt --to=iec $SIZE_BYTES) exceeds ${THRESH_MB}MB, splitting..."
              cd "$TEMP_DIR"
              BASE_NAME=$(basename "$DOWNLOADED_FILE")
              ZIP_NAME="${BASE_NAME%.*}.zip"
              zip -r -s "${THRESH_MB}m" "$ZIP_NAME" "$BASE_NAME"
              rm "$BASE_NAME"
              cd "$OLDPWD"
            fi

            # انتقال به پوشه downloads (برای push به repo)
            DEST="downloads/video_${idx}"
            mkdir -p "$DEST"
            mv "$TEMP_DIR"/* "$DEST/"
            rmdir "$TEMP_DIR"

            echo "✅ Video $((idx+1)) done."
          done

          echo "folders=$(ls downloads | paste -sd ',' -)" >> $GITHUB_OUTPUT

      - name: 📅 Get Current Date
        id: get_date
        run: echo "date=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: 📤 Push to Repository
        if: github.event.inputs.upload_method == 'repository (push to repo)'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --strategy-option=theirs origin main
          git add downloads/
          git commit -m "📁 افزودن ویدیوهای جدید [skip ci]" || echo "Nothing to commit"
          git push origin main

      - name: 📤 Upload to GitHub Releases
        if: github.event.inputs.upload_method == 'release (GitHub Releases)'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('yt-batch-{0}', github.run_number) }}
          name: "دانلود گروهی YouTube - ${{ steps.get_date.outputs.date }}"
          body: |
            **📦 دانلود گروهی ویدیوها**
            تعداد: $(ls downloads | wc -l)
            لینک‌ها: ${{ github.event.inputs.video_urls }}
            کیفیت: ${{ github.event.inputs.desired_quality }}
            فرمت: ${{ github.event.inputs.output_format }}
            ---
            Powered by yt-dlp and GitHub Actions ⚡
          files: downloads/**/*
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false

      - name: 🧹 Cleanup
        if: always()
        run: rm -rf release_files 2>/dev/null || true
