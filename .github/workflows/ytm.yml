name: مولتی یوتیوب 

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: 'لینک‌های یوتیوب (حداکثر ۵ لینک، با فاصله جدا کنید)'
        required: true
        type: string
      output_format:
        description: 'نوع خروجی'
        required: true
        type: choice
        options:
          - mp4 (video)
          - mp3 (audio only)
        default: 'mp4 (video)'
      desired_quality:
        description: 'کیفیت (ویدیو: 144p,240p,360p,... | صدا: 64kbps,...)'
        required: false
        type: string
        default: '360p'
      max_part_mb:
        description: 'حداکثر حجم هر قسمت (MB) - 0 = خودکار ۱۸۰۰'
        required: false
        type: string
        default: '90'
      upload_method:
        description: '📤 روش ذخیره نهایی'
        required: true
        type: choice
        options:
          - repository (push to repo)
          - release (GitHub Releases)
        default: 'repository (push to repo)'
      release_tag:
        description: '🏷️ نام تگ ریلیز (فقط در صورت انتخاب Release)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  youtube-download:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zip curl python3 python3-pip
          pip3 install --quiet requests

      - name: 🔄 Process Multiple Videos
        id: process
        run: |
          mkdir -p release_files all_videos_info
          IFS=' ' read -ra URL_ARRAY <<< "${{ github.event.inputs.video_urls }}"
          URL_ARRAY=("${URL_ARRAY[@]:0:5}")
          TOTAL=${#URL_ARRAY[@]}
          echo "Total videos to process: $TOTAL"
          if [ $TOTAL -eq 0 ]; then
            echo "::error::No valid URLs provided"
            exit 1
          fi
          if [[ "${{ github.event.inputs.output_format }}" == "mp3 (audio only)" ]]; then
            FMT="mp3"
          else
            FMT="mp4"
          fi
          QUALITY="${{ github.event.inputs.desired_quality }}"
          MAX_MB="${{ github.event.inputs.max_part_mb }}"
          for idx in "${!URL_ARRAY[@]}"; do
            url="${URL_ARRAY[$idx]}"
            echo "=========================================="
            echo "Processing video $((idx+1)) of $TOTAL: $url"
            echo "=========================================="
            export CURRENT_URL="$url"
            export CURRENT_INDEX="$idx"
            export INPUT_FORMAT="$FMT"
            export INPUT_QUALITY="$QUALITY"
            
            python3 .github/scripts/get_link.py
            python3 .github/scripts/download.py
            export MAX_PART_MB="$MAX_MB"
            python3 .github/scripts/split.py
            
            echo "✅ Video $((idx+1)) done."
          done
          echo "folders=$(ls release_files | paste -sd ',' -)" >> $GITHUB_OUTPUT

      - name: 📅 Get Current Date
        id: get_date
        run: echo "date=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: 📤 Push to Repository
        if: github.event.inputs.upload_method == 'repository (push to repo)'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --strategy-option=theirs origin main
          mkdir -p downloads
          for folder in $(ls release_files); do
            mv "release_files/$folder" "downloads/"
          done
          git add downloads/
          git commit -m "📁 افزودن چند ویدیو جدید [skip ci]" || echo "Nothing to commit"
          git push origin main

      - name: 📤 Upload to GitHub Releases
        if: github.event.inputs.upload_method == 'release (GitHub Releases)'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('yt-batch-{0}', github.run_number) }}
          name: "دانلود گروهی YouTube - ${{ steps.get_date.outputs.date }}"
          body: |
            **📦 دانلود گروهی ویدیوها**
            تعداد ویدیوها: `$(ls release_files | wc -l)`
            لینک‌های دریافتی:
            ${{ github.event.inputs.video_urls }}
            کیفیت: ${{ github.event.inputs.desired_quality }}
            فرمت: ${{ github.event.inputs.output_format }}
            
            ---
            Powered by Meli-Action ⚡
          files: release_files/*/*
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false

      - name: 🧹 Cleanup
        if: always()
        run: rm -rf release_files all_videos_info 2>/dev/null || true
