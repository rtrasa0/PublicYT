name: دانلودر یوتیوب (۵ ویدیو همزمان)

on:
  workflow_dispatch:
    inputs:
      video_url_1:
        description: '🎬 لینک اول'
        required: true
        type: string
      video_url_2:
        description: '🎬 لینک دوم'
        required: true
        type: string
      video_url_3:
        description: '🎬 لینک سوم'
        required: true
        type: string
      video_url_4:
        description: '🎬 لینک چهارم'
        required: true
        type: string
      video_url_5:
        description: '🎬 لینک پنجم'
        required: true
        type: string

      output_format:
        description: 'نوع خروجی'
        required: true
        type: choice
        options:
          - mp4 (video)
          - mp3 (audio only)
        default: 'mp4 (video)'

      desired_quality:
        description: 'کیفیت (ویدیو: 144p,240p,360p,480p,720p,1080p | صدا: 64kbps,128kbps,192kbps,320kbps)'
        required: false
        type: string
        default: '360p'

      max_part_mb:
        description: 'حداکثر حجم هر قسمت (MB) - 0 = خودکار ۱۸۰۰ مگابایت'
        required: false
        type: string
        default: '94'

      upload_method:
        description: '📤 روش ذخیره نهایی'
        required: true
        type: choice
        options:
          - repository (push to repo)
          - release (GitHub Releases)
        default: 'repository (push to repo)'

      release_tag:
        description: '🏷️ نام تگ ریلیز (فقط در صورت انتخاب Release)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  youtube-download:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zip curl python3 python3-pip
          pip3 install --quiet requests

      - name: 🔗 Get Download Links (up to 5 videos)
        run: |
          python3 << 'EOF'
          import os, sys, time, re, requests
          from datetime import datetime

          # جمع‌آوری لینک‌ها (لینک‌های خالی حذف می‌شوند)
          urls = []
          for i in range(1, 6):
              u = os.environ.get(f'INPUT_URL_{i}', '').strip()
              if u:
                  urls.append(u)

          if not urls:
              print("::error::No valid URLs provided")
              sys.exit(1)

          FMT  = os.environ.get('INPUT_FORMAT')
          QUAL = os.environ.get('INPUT_QUALITY')
          is_audio = (FMT == 'mp3')

          # ----- Quality validation -----
          if is_audio:
              valid_bitrates = ['64kbps', '128kbps', '192kbps', '320kbps']
              if QUAL not in valid_bitrates:
                  print(f"::warning::Bitrate '{QUAL}' نامعتبر، استفاده از 192kbps")
                  QUAL = '192kbps'
          else:
              valid_video_qualities = ['144p', '240p', '360p', '480p', '720p', '1080p', '1440p', '2160p']
              if QUAL not in valid_video_qualities:
                  print(f"::warning::کیفیت '{QUAL}' پشتیبانی نمی‌شود، استفاده از 720p")
                  QUAL = '720p'

          s = requests.Session()
          s.headers.update({"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"})
          s.get("https://media.ytmp3.gg/")

          results = []
          for url in urls:
              print(f"Processing: {url}")
              payload = {
                  "url": url,
                  "os": "linux",
                  "output": {
                      "type": "audio" if is_audio else "video",
                      "format": FMT
                  }
              }
              if is_audio:
                  payload["audio"] = {"bitrate": QUAL}
              else:
                  payload["output"]["quality"] = QUAL

              resp = s.post("https://hub.ytconvert.org/api/download", json=payload, timeout=30)
              resp.raise_for_status()
              data = resp.json()

              status_url = data.get('statusUrl')
              title = data.get('title', 'video')

              dl_url = None
              for _ in range(150):
                  time.sleep(2)
                  r = s.get(status_url, timeout=20)
                  status = r.json()
                  if status.get('status') == 'completed':
                      dl_url = status.get('downloadUrl')
                      break
                  if status.get('status') == 'failed':
                      print(f"::error::Server failed to prepare: {title}")
                      sys.exit(1)

              if not dl_url:
                  print(f"::error::Could not get download link for {title}")
                  sys.exit(1)

              # ساخت نام فایل و پوشه (شامل عنوان، کیفیت، زمان)
              video_id = re.search(r'(?:v=|youtu\.be/)([a-zA-Z0-9_-]{11})', url)
              video_id = video_id[1] if video_id else 'unknown'
              clean_title = re.sub(r'[^a-zA-Z0-9\-_()\[\]]', '_', title.replace(' ', '_'))
              clean_title = re.sub(r'_+', '_', clean_title).strip('_')[:70]
              if not clean_title:
                  clean_title = video_id

              timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")
              filename = f"{clean_title}_{QUAL}_{timestamp}.{FMT}"
              folder_name = f"{clean_title}_{QUAL}_{timestamp}"

              results.append({
                  'dl_url': dl_url,
                  'filename': filename,
                  'title': title,
                  'folder': folder_name,
                  'url': url
              })

          # ----- ذخیره اطلاعات دانلود -----
          with open(".download_info", "w", encoding="utf-8") as f:
              for r in results:
                  f.write(f"{r['dl_url']}|{r['filename']}|{r['title']}|{r['folder']}\n")

          # ----- ساخت بدنه ریلیز (نمایش عنوان‌ها) -----
          with open(".release_body.md", "w", encoding="utf-8") as f:
              f.write(f"**📽️ YouTube Download ({len(results)} videos)**\n\n")
              for i, r in enumerate(results, 1):
                  f.write(f"### ویدیو {i}\n")
                  f.write(f"- **عنوان:** {r['title']}\n")
                  f.write(f"- **لینک اصلی:** {r['url']}\n")
                  f.write(f"- **کیفیت:** {QUAL}\n")
                  f.write(f"- **فرمت:** {FMT}\n")
                  f.write(f"- **پوشه:** `{r['folder']}`\n")
                  f.write(f"- **نام فایل:** `{r['filename']}`\n\n")
              f.write(f"**زمان دانلود:** {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\n\n---\nPowered by Meli-Action ⚡\n")

          # ----- نام ریلیز (بر اساس عناوین) -----
          release_name = ", ".join(r['title'] for r in results)
          if len(release_name) > 100:
              release_name = f"{results[0]['title']} ... (total {len(results)} videos)"
          with open(".release_name.txt", "w", encoding="utf-8") as f:
              f.write(release_name)

          # ----- پیام commit (در صورت push) -----
          commit_msg = "📁 " + " | ".join(r['title'][:40] for r in results)
          if len(commit_msg) > 250:
              commit_msg = f"📁 {len(results)} ویدیو جدید دانلود شد"
          with open(".commit_msg.txt", "w", encoding="utf-8") as f:
              f.write(commit_msg)
          EOF
        env:
          INPUT_URL_1: ${{ github.event.inputs.video_url_1 }}
          INPUT_URL_2: ${{ github.event.inputs.video_url_2 }}
          INPUT_URL_3: ${{ github.event.inputs.video_url_3 }}
          INPUT_URL_4: ${{ github.event.inputs.video_url_4 }}
          INPUT_URL_5: ${{ github.event.inputs.video_url_5 }}
          INPUT_FORMAT: ${{ github.event.inputs.output_format == 'mp3 (audio only)' && 'mp3' || 'mp4' }}
          INPUT_QUALITY: ${{ github.event.inputs.desired_quality }}

      - name: 📥 Download All Files
        run: |
          while IFS='|' read -r DL_URL FILENAME TITLE FOLDER; do
            echo "📥 Downloading: $FILENAME (Title: $TITLE) → folder $FOLDER"
            mkdir -p "release_files/$FOLDER"
            curl -L --fail --progress-bar -o "release_files/$FOLDER/$FILENAME" "$DL_URL"
            if [ ! -s "release_files/$FOLDER/$FILENAME" ]; then
              echo "::error::File $FILENAME is empty!"
              exit 1
            fi
          done < .download_info

      - name: ✂️ Split Large Files (if needed)
        run: |
          THRESH_MB="${{ github.event.inputs.max_part_mb }}"
          if [[ "$THRESH_MB" -le 0 ]] || [[ "$THRESH_MB" -gt 1900 ]]; then
            THRESH_MB=1800
          fi
          while IFS='|' read -r DL_URL FILENAME TITLE FOLDER; do
            cd "release_files/$FOLDER"
            FILESIZE=$(stat -c%s "$FILENAME" 2>/dev/null || echo 0)
            THRESH_BYTES=$((THRESH_MB * 1024 * 1024))
            if [ "$FILESIZE" -gt "$THRESH_BYTES" ]; then
              echo "🔪 Splitting $FILENAME into ${THRESH_MB}MB parts..."
              BASE="${FILENAME%.*}"
              zip -r -s "${THRESH_MB}m" "${BASE}.zip" -- "$FILENAME"
              rm -- "$FILENAME"
              echo "Parts created:"
              ls -lh
            else
              echo "📦 No split needed for $FILENAME ($(( FILESIZE / 1024 / 1024 )) MB)"
            fi
            cd ../..
          done < .download_info

      - name: 📤 Push to Repository (all folders)
        if: github.event.inputs.upload_method == 'repository (push to repo)'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --strategy-option=theirs origin main
          mkdir -p downloads
          while IFS='|' read -r DL_URL FILENAME TITLE FOLDER; do
            if [ -d "release_files/$FOLDER" ]; then
              mv "release_files/$FOLDER" "downloads/"
            fi
          done < .download_info
          git add downloads/
          COMMIT_MSG=$(cat .commit_msg.txt)
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "$COMMIT_MSG"
            git push origin main
          fi

      - name: 📤 Upload to GitHub Releases (all videos)
        if: github.event.inputs.upload_method == 'release (GitHub Releases)'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('yt-{0}', github.run_number) }}
          name: ${{ steps.get_release_name.outputs.name || format('YouTube - {0}', github.run_number) }}
          body_path: .release_body.md
          files: release_files/*/*
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false

      - name: 🧹 Cleanup
        if: always()
        run: rm -rf release_files .download_info .release_body.md .release_name.txt .commit_msg.txt 2>/dev/null || true
