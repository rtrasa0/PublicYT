name: دانلودر یوتیوب

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string

      output_format:
        description: 'نوع خروجی'
        required: true
        type: choice
        options:
          - mp4 (video)
          - mp3 (audio only)
        default: 'mp4 (video)'

      desired_quality:
        description: 'کیفیت (ویدیو: 144p,240p,360p,480p,720p,1080p | صدا: 64kbps,128kbps,192kbps,320kbps)'
        required: false
        type: string
        default: '360p'

      max_part_mb:
        description: 'حداکثر حجم هر قسمت (MB) - 0 = خودکار ۱۸۰۰ مگابایت'
        required: false
        type: string
        default: '95'

      upload_method:
        description: '📤 روش ذخیره نهایی'
        required: true
        type: choice
        options:
          - repository (push to repo)
          - release (GitHub Releases)
        default: 'repository (push to repo)'

      release_tag:
        description: '🏷️ نام تگ ریلیز (فقط در صورت انتخاب Release)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  youtube-download:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0   # برای git pull نیاز به تاریخچه کامل است

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zip curl python3 python3-pip
          pip3 install --quiet requests

      - name: 🔗 Get Download Link
        id: retrieve
        run: |
          python3 << 'EOF'
          import os, sys, time, re, requests
          from datetime import datetime

          URL  = os.environ.get('INPUT_URL')
          FMT  = os.environ.get('INPUT_FORMAT')   # 'mp4' or 'mp3'
          QUAL = os.environ.get('INPUT_QUALITY')

          is_audio = (FMT == 'mp3')

          # ----- Quality validation -----
          if is_audio:
              valid_bitrates = ['64kbps', '128kbps', '192kbps', '320kbps']
              if QUAL not in valid_bitrates:
                  print(f"::warning::Bitrate '{QUAL}' نامعتبر، استفاده از 192kbps")
                  QUAL = '192kbps'
          else:
              valid_video_qualities = ['144p', '240p', '360p', '480p', '720p', '1080p', '1440p', '2160p']
              if QUAL not in valid_video_qualities:
                  print(f"::warning::کیفیت '{QUAL}' پشتیبانی نمی‌شود، استفاده از 720p")
                  QUAL = '720p'

          # ----- Build API payload -----
          payload = {
              "url": URL,
              "os": "linux",
              "output": {
                  "type": "audio" if is_audio else "video",
                  "format": FMT
              }
          }
          if is_audio:
              payload["audio"] = {"bitrate": QUAL}
          else:
              payload["output"]["quality"] = QUAL

          # ----- Send request -----
          s = requests.Session()
          s.headers.update({"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"})
          s.get("https://media.ytmp3.gg/")

          resp = s.post("https://hub.ytconvert.org/api/download", json=payload, timeout=30)
          resp.raise_for_status()
          data = resp.json()

          status_url = data.get('statusUrl')
          title = data.get('title', 'video')

          # ----- Poll for completion -----
          dl_url = None
          for _ in range(150):
              time.sleep(2)
              r = s.get(status_url, timeout=20)
              status = r.json()
              if status.get('status') == 'completed':
                  dl_url = status.get('downloadUrl')
                  break
              if status.get('status') == 'failed':
                  print("::error::Server failed to prepare the video")
                  sys.exit(1)

          if not dl_url:
              print("::error::Could not get download link")
              sys.exit(1)

          # ----- Generate safe filename and folder name -----
          video_id = re.search(r'(?:v=|youtu\.be/)([a-zA-Z0-9_-]{11})', URL)[1]
          clean_title = re.sub(r'[^a-zA-Z0-9\-_()\[\]]', '_', title.replace(' ', '_'))
          clean_title = re.sub(r'_+', '_', clean_title).strip('_')[:70] or video_id
          filename = f"{clean_title}_{video_id}_{QUAL}.{FMT}"
          
          # ساخت نام پوشه (اگر عنوان تکراری شد، فقط از video_id استفاده کن)
          timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")
          if clean_title == video_id:
              folder_name = f"{video_id}_{timestamp}"
          else:
              folder_name = f"{clean_title}_{video_id}_{timestamp}"
          folder_name = re.sub(r'[^a-zA-Z0-9\-_()\[\]]', '_', folder_name)

          # ----- Save info -----
          with open(".download_info", "w", encoding="utf-8") as f:
              f.write(f"{dl_url}\n{filename}\n{title}\n{folder_name}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"filename={filename}\n")
              f.write(f"title={title}\n")
              f.write(f"folder={folder_name}\n")
          EOF
        env:
          INPUT_URL:     ${{ github.event.inputs.video_url }}
          INPUT_FORMAT:  ${{ github.event.inputs.output_format == 'mp3 (audio only)' && 'mp3' || 'mp4' }}
          INPUT_QUALITY: ${{ github.event.inputs.desired_quality }}

      - name: 📥 Download File
        run: |
          DL_URL=$(head -1 .download_info)
          FILENAME=$(sed -n '2p' .download_info)
          FOLDER=$(sed -n '4p' .download_info)
          mkdir -p "release_files/$FOLDER"
          echo "Downloading: $FILENAME into folder $FOLDER"
          curl -L --fail --progress-bar -o "release_files/$FOLDER/$FILENAME" "$DL_URL"
          if [ ! -s "release_files/$FOLDER/$FILENAME" ]; then
            echo "::error::Downloaded file is empty!"
            exit 1
          fi

      - name: ✂️ Split Large File (if needed)
        run: |
          FILENAME="${{ steps.retrieve.outputs.filename }}"
          FOLDER="${{ steps.retrieve.outputs.folder }}"
          THRESH_MB="${{ github.event.inputs.max_part_mb }}"
          if [[ "$THRESH_MB" -le 0 ]] || [[ "$THRESH_MB" -gt 1900 ]]; then
            THRESH_MB=1800
          fi
          cd "release_files/$FOLDER"
          FILESIZE=$(stat -c%s "$FILENAME" 2>/dev/null || echo 0)
          THRESH_BYTES=$((THRESH_MB * 1024 * 1024))

          if [ "$FILESIZE" -gt "$THRESH_BYTES" ]; then
            echo "🔪 Splitting into ${THRESH_MB}MB parts inside $FOLDER..."
            BASE="${FILENAME%.*}"
            zip -r -s "${THRESH_MB}m" "${BASE}.zip" -- "$FILENAME"
            rm -- "$FILENAME"
            echo "Parts created:"
            ls -lh
          else
            echo "📦 No split needed ($(( FILESIZE / 1024 / 1024 )) MB)"
          fi
          cd ../..

      - name: 📅 Get Current Date
        id: get_date
        run: echo "date=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: 📤 Push to Repository (هر ویدیو در پوشه مجزا)
        if: github.event.inputs.upload_method == 'repository (push to repo)'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # همگام‌سازی با آخرین تغییرات ریموت
          git pull --rebase --strategy-option=theirs origin main
          
          FOLDER="${{ steps.retrieve.outputs.folder }}"
          mkdir -p downloads
          if [ -d "release_files/$FOLDER" ]; then
            mv "release_files/$FOLDER" "downloads/"
            git add "downloads/$FOLDER"
            git commit -m "📁 ویدیو جدید: $FOLDER [skip ci]" || echo "No new files to commit"
            git push origin main
          else
            echo "Folder not found, skipping push"
          fi

      - name: 📤 Upload to GitHub Releases (با حفظ نام پوشه در توضیحات)
        if: github.event.inputs.upload_method == 'release (GitHub Releases)'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('yt-{0}', github.run_number) }}
          name: ${{ format('YouTube - {0}', steps.retrieve.outputs.filename) }}
          body: |
            **📽️ YouTube Download**

            **Title:** ${{ steps.retrieve.outputs.title }}
            **Original Link:** ${{ github.event.inputs.video_url }}
            **Quality:** ${{ github.event.inputs.desired_quality }}
            **Format:** ${{ github.event.inputs.output_format }}
            **Downloaded on:** ${{ steps.get_date.outputs.date }}
            **Folder name:** `${{ steps.retrieve.outputs.folder }}`

            ---
            Powered by Meli-Action ⚡
          files: release_files/${{ steps.retrieve.outputs.folder }}/*
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false

      - name: 🧹 Cleanup
        if: always()
        run: rm -rf release_files .download_info 2>/dev/null || true
